# Compila o app iOS SEM assinatura num Mac da nuvem (runner do GitHub).
# O .ipa gerado é instalado no iPhone pelo AltStore, que re-assina com o
# Apple ID gratuito do Flavio. Xcode 26 (runner macos-26) é obrigatório
# por causa do AlarmKit (SDK do iOS 26).
name: Build iOS (ipa não assinado)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# Sem isto o GITHUB_TOKEN é só-leitura e o passo de publicar Release falha
# (causa da falha do build 3).
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências JS
        run: npm ci

      - name: Testes e tipos (barreira de qualidade)
        run: |
          npx tsc --noEmit
          npx jest --ci

      - name: Gerar projeto nativo iOS (prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: Instalar pods (CocoaPods)
        run: pod install --project-directory=ios

      # "build" (e não "archive"): sem assinatura, o archive não coloca o app
      # em Products/Applications — o build com derivedDataPath deixa o .app em
      # Build/Products/Release-iphoneos, caminho previsível para empacotar.
      - name: Compilar sem assinatura
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -1)
          # O scheme do app tem o mesmo nome do workspace (gerado pelo prebuild).
          # NUNCA pegar schemes[0] da lista: vem em ordem alfabética e o
          # primeiro é um Pod (EXConstants) — foi a causa dos builds 1 e 2.
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Empacotar .ipa
        run: |
          APP=$(ls -d build/Build/Products/Release-iphoneos/*.app | head -1)
          echo "App compilado: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qry HoraDoRemedio-unsigned.ipa Payload
          ls -lh HoraDoRemedio-unsigned.ipa

      - name: Publicar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: HoraDoRemedio-ipa
          path: HoraDoRemedio-unsigned.ipa
          retention-days: 30

      - name: Publicar Release (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" HoraDoRemedio-unsigned.ipa \
            --title "Hora do Remédio ${GITHUB_REF_NAME}" \
            --notes "Arquivo .ipa não assinado — instalar pelo AltStore (ver README)." \
            --repo "${GITHUB_REPOSITORY}"
